<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Universal Clipboard – Client</title>

    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --primary: #2563eb;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --radius: 10px;
        --highlight: #fde68a;
      }

      body.dark {
        --bg: #0f172a;
        --card: #020617;
        --primary: #60a5fa;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: #1e293b;
        --highlight: #92400e;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
        background: var(--bg);
        color: var(--text);
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .container {
        max-width: 420px;
        margin: auto;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        margin-bottom: 14px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      input {
        width: 67%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 13px;
      }

      button {
        padding: 8px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: white;
        cursor: pointer;
      }

      .secondary {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--border);
      }

      #clipboard {
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 10px;
        min-height: 60px;
        background: rgba(0, 0, 0, 0.02);
        white-space: pre-wrap;
        word-break: break-word;
      }

      #history {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 220px;
        overflow-y: auto;
      }

      #history li {
        padding: 8px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }

      #history li:hover {
        background: rgba(0, 0, 0, 0.04);
      }

      .history-title {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 4px;
      }

      .history-content {
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .history-image {
        max-width: 100%;
        max-height: 140px;
        object-fit: contain;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.04);
        padding: 4px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      .history-image:hover {
        transform: scale(1.02);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
      }

      img.preview {
        max-width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin-top: 6px;
      }

      #status {
        font-size: 13px;
        color: var(--muted);
      }

      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        opacity: 0;
        pointer-events: none;

        /* 🔥 FIX */
        z-index: 2147483647;

        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
      }

      /* ===================== CHAT ===================== */

      #chatToggleBtn {
        position: relative;
      }

      .chat-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ef4444;
        border: 2px solid var(--bg);
        display: none;
      }

      .chat-badge.visible {
        display: block;
      }

      #chatPanel {
        display: none;
        flex-direction: column;
        gap: 0;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        border: 1px solid var(--border);
        background: var(--card);
        margin-bottom: 14px;
      }

      #chatPanel.open {
        display: flex;
      }

      .chat-header {
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      #chatMessages {
        min-height: 180px;
        max-height: 280px;
        overflow-y: auto;
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scroll-behavior: smooth;
      }

      #chatMessages::-webkit-scrollbar { width: 3px; }
      #chatMessages::-webkit-scrollbar-track { background: transparent; }
      #chatMessages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .chat-empty {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        padding: 28px 0;
        opacity: 0.7;
      }

      .msg-group {
        display: flex;
        flex-direction: column;
        max-width: 78%;
        gap: 2px;
        animation: msgIn 0.18s ease;
      }

      @keyframes msgIn {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .msg-group.outgoing { align-self: flex-end; align-items: flex-end; }
      .msg-group.incoming { align-self: flex-start; align-items: flex-start; }

      .msg-meta {
        font-size: 10px;
        color: var(--muted);
        padding: 0 4px;
      }

      .msg-bubble {
        padding: 8px 12px;
        border-radius: 15px;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg-group.outgoing .msg-bubble {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 6px rgba(99,102,241,0.3);
      }

      .msg-group.incoming .msg-bubble {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .chat-input-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 8px 10px;
        border-top: 1px solid var(--border);
      }

      #chatInput {
        flex: 1;
        min-height: 34px;
        max-height: 90px;
        resize: none;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 13px;
        font-family: inherit;
        background: rgba(0,0,0,0.02);
        color: var(--text);
        line-height: 1.4;
        transition: border 0.15s;
        overflow-y: auto;
      }

      #chatInput:focus {
        outline: none;
        border-color: var(--primary);
      }

      #chatSendBtn {
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        padding: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        box-shadow: 0 2px 6px rgba(99,102,241,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: opacity 0.15s, transform 0.1s;
      }

      #chatSendBtn:hover { opacity: 0.88; transform: scale(1.06); }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="top">
        <h2>Universal Clipboard</h2>
        <div style="display:flex;gap:6px;align-items:center;">
          <button id="chatToggleBtn" class="secondary" style="position:relative;" title="Toggle Chat">
            💬
            <span class="chat-badge" id="chatBadge"></span>
          </button>
          <button id="darkToggle" class="secondary">🌙</button>
        </div>
      </div>

      <div class="card">
        <div id="status">Connecting…</div>
      </div>

      <!-- Chat Panel -->
      <div id="chatPanel">
        <div class="chat-header">💬 Chat</div>
        <div id="chatMessages">
          <div class="chat-empty" id="chatEmpty">No messages yet. Say hello! 👋</div>
        </div>
        <div class="chat-input-row">
          <textarea id="chatInput" placeholder="Type a message…" rows="1"></textarea>
          <button id="chatSendBtn" title="Send">➤</button>
        </div>
      </div>

      <!-- Pair with code -->
      <div
        class="card"
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
        "
      >
        <input id="codeInput" placeholder="Enter pairing code" />
        <button id="pairBtn">Pair Device</button>
      </div>

      <!-- Last Clipboard -->
      <div class="card">
        <strong>Last Clipboard</strong>
        <div id="clipboard">—</div>
      </div>

      <!-- Search -->
      <div class="card">
        <input
          id="searchInput"
          placeholder="Search clipboard history…"
          style="width: 95%"
        />
      </div>

      <!-- History -->
      <div class="card">
        <strong>Clipboard History</strong>
        <ul id="history"></ul>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="renderer.js"></script>
  </body>
</html>
