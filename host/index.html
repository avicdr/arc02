<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Universal Clipboard – Host</title>

    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger-bg: #fee2e2;
        --danger-text: #b91c1c;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e5e7eb;
        --radius: 14px;
        --highlight: #fde68a;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.12);
      }

      body.dark {
        --bg: #0b1220;
        --card: #020617;
        --primary: #60a5fa;
        --primary-hover: #3b82f6;
        --danger-bg: #3f1d1d;
        --danger-text: #f87171;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: #1e293b;
        --highlight: #92400e;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 600px;
        margin: auto;
      }

      h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      h3 {
        margin: 28px 0 10px;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.12em;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: var(--shadow-sm);
        transition:
          box-shadow 0.2s ease,
          transform 0.15s ease;
      }

      .card:hover {
        box-shadow: var(--shadow-md);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-size: 14px;
        background: transparent;
        color: var(--text);
        transition: border 0.15s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
      }

      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          transform 0.1s ease,
          box-shadow 0.1s ease;
        box-shadow: var(--shadow-sm);
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      button.secondary {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--border);
        box-shadow: none;
      }

      button.secondary:hover {
        background: rgba(0, 0, 0, 0.04);
      }

      button.revoke {
        background: var(--danger-bg);
        color: var(--danger-text);
        font-size: 12px;
      }

      #qr img {
        margin-top: 14px;
        max-width: 200px;
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
      }

      #timer {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        margin-bottom: 10px;
        cursor: pointer;
        background: var(--card);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      li:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .history-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .history-content {
        font-size: 13px;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .history-image {
        max-width: 100%;
        max-height: 160px;
        object-fit: contain;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.03);
        padding: 6px;
        margin-top: 6px;
      }

      mark {
        background: var(--highlight);
        padding: 0 4px;
        border-radius: 4px;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--card);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        box-shadow: var(--shadow-lg);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
        z-index: 2147483647;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card row">
        <h2>Universal Clipboard</h2>
        <button id="darkToggle" class="secondary">🌙</button>
      </div>

      <div class="card">Status: <strong id="status">Starting…</strong></div>

      <h3>Pair Device</h3>
      <div class="card">
        <div class="row">
          <strong id="pairCode">—</strong>
          <button id="pairBtn" class="secondary">
            Generate New Pairing Code
          </button>
        </div>
        <div id="qr"></div>
        <div id="timer"></div>
      </div>

      <h3>Connected Devices</h3>
      <div class="card">
        <ul id="devices"></ul>
      </div>

      <h3>Last Clipboard</h3>
      <div class="card">
        <div id="clipboard">—</div>
        <div id="meta" style="margin-top: 10px"></div>
      </div>

      <h3>Clipboard History</h3>

      <div class="card">
        <input id="searchInput" placeholder="Search clipboard history…" />
      </div>

      <div class="card">
        <ul id="history"></ul>
      </div>
    </div>

    <div id="toast" class="toast">Copied to Clipboard</div>
    <script src="renderer.js"></script>
  </body>
</html>
